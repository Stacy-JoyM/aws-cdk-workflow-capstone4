version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Node version:"
      - node --version
      - npm --version
      - echo "Installing project dependencies..."
      - npm install
      - echo "Installing Lambda dependencies..."
      - cd lambda && npm install && cd ..

  pre_build:
    commands:
      - echo "Setting up environment variables..."
      - export CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
      - export CDK_DEFAULT_REGION=us-east-1
      - echo "Environment variables set:"
      - echo "  CDK_DEFAULT_ACCOUNT=$CDK_DEFAULT_ACCOUNT"
      - echo "  CDK_DEFAULT_REGION=$CDK_DEFAULT_REGION"
      - echo "Checking if CDK is already bootstrapped..."
      - |
        if aws cloudformation describe-stacks --stack-name CDKToolkit --region $CDK_DEFAULT_REGION >/dev/null 2>&1; then
          echo "CDK already bootstrapped"
        else
          echo "Bootstrapping CDK..."
          npx cdk bootstrap aws://${CDK_DEFAULT_ACCOUNT}/${CDK_DEFAULT_REGION}
        fi

  build:
    commands:
      - echo "Building the project..."
      - npm run build
      - echo "Synthesizing CDK with asset upload..."
      - npx cdk synth --all
      - echo "Deploying with CDK (this will upload assets)..."
      - npx cdk deploy AwsCdkWorkflowProjectStack --require-approval never --verbose

artifacts:
  files:
    - '**/*'
  base-directory: cdk.out
